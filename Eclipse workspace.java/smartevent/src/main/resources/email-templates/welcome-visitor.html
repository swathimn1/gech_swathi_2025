<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Email</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ff6a00 0%, #ee0979 50%, #fcb045 100%);
      color: #fff;
    }

    .email-container {
      max-width: 600px;
      margin: 3rem auto;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 25px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.1rem;
      margin: 0.5rem 0;
    }

    .btn-primary {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      background: linear-gradient(135deg, #17a2b8, #138496);
      color: #fff;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="email-container">
   <!--   <h2 th:text="'Welcome, ' + ${name} + ' 🎉'">Welcome, User 🎉</h2>-->
   <h2>Welcome, {{name}}</h2>
    <p>Your Smart Event account is ready!</p>
    <p>You can now explore events, scan QR codes & earn rewards.</p>
  <!--   <a th:href="@{/login}" class="btn-primary">Login to Your Account</a> -->
    <p class="mt-4">Happy Exploring! 🚀</p>
  </div>
</body>
</html>
