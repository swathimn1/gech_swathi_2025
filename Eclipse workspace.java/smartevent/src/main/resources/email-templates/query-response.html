<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Query Response</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ff6a00 0%, #ee0979 50%, #fcb045 100%);
      color: #fff;
    }

    .email-container {
      max-width: 600px;
      margin: 3rem auto;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 25px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #17a2b8;
    }

    .info {
      text-align: left;
      margin: 1rem 0;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
    }

    .info p {
      margin: 0.3rem 0;
      font-weight: 500;
    }

    .btn-primary {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      background: linear-gradient(135deg, #17a2b8, #138496);
      color: #fff;
      font-weight: 600;
      text-decoration: none;
    }

    .footer-text {
      margin-top: 2rem;
      text-align: center;
      font-style: italic;
      color: #f0f0f0;
    }
  </style>
</head>
<body>
  <div class="email-container">
    <h2>Your Query Has Been Answered 💬</h2>

    <div class="info">
      <p><strong>Stall:</strong> {{stallName}}</p>
      <p><strong>Your Query:</strong> {{queryText}}</span></p>
      <p><strong>Response:</strong> {{answer}}</p>
    </div>

   <!--   <a th:href="@{/login}" class="btn-primary">Log In to Your Account</a>-->

    <p class="footer-text">Thank you for visiting! 🌟</p>
  </div>
</body>
</html>
